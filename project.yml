name: SmartInputSwitcher
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  SmartInputSwitcher:
    type: application
    platform: macOS
    sources:
      - path: Sources/SmartInputSwitcher
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SmartInputSwitcher
        INFOPLIST_FILE: Sources/SmartInputSwitcher/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PRODUCT_NAME: SmartInputSwitcher
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
